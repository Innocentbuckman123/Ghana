<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>(function(){try{var t=localStorage.getItem('oilLedgerTheme'); if(t==='light') document.documentElement.setAttribute('data-theme','light');}catch(e){}})();</script>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Oil Ledger — Business Tracker</title>
<meta name="theme-color" content="#14201C">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Oil Ledger">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2314201C'/%3E%3Ctext x='50' y='68' font-size='58' text-anchor='middle'%3E%F0%9F%9B%A2%EF%B8%8F%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2314201C'/%3E%3Ctext x='50' y='68' font-size='58' text-anchor='middle'%3E%F0%9F%9B%A2%EF%B8%8F%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#101B17;
    --surface:#18251F;
    --surface2:#20302A;
    --line:#2C3E36;
    --amber:#E8A33D;
    --amber-dim:#8A6428;
    --rust:#C2542B;
    --teal:#57BBA3;
    --red:#E2685A;
    --text:#F3EFE3;
    --text-dim:#A8BCB2;
    --text-faint:#78907F;
    --header-grad:#182821;
    --nav-bg:rgba(16,27,23,.92);
    --radius:16px;
  }
  html[data-theme="light"]{
    --bg:#F7F3EA;
    --surface:#FFFFFF;
    --surface2:#EFE7D4;
    --line:#DED2B4;
    --amber:#B5762A;
    --amber-dim:#DCB679;
    --rust:#A8431F;
    --teal:#237A63;
    --red:#B93A29;
    --text:#241C12;
    --text-dim:#5C6156;
    --text-faint:#84897C;
    --header-grad:#FFFFFF;
    --nav-bg:rgba(247,243,234,.92);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'Inter',sans-serif; font-size:15px;
    padding-bottom:calc(130px + env(safe-area-inset-bottom));
    overscroll-behavior-y:none;
  }
  h1,h2,h3,.num-xl,.num-lg{font-family:'Fraunces',serif;}
  ::-webkit-scrollbar{display:none;}

  header.top{
    padding:calc(18px + env(safe-area-inset-top)) 18px 16px;
    background:linear-gradient(180deg,var(--header-grad) 0%, var(--bg) 100%);
    border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:5;
  }
  .brand{display:flex; align-items:center; justify-content:space-between;}
  .brand-name{font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:var(--amber); font-weight:600;}
  .brand-sub{font-size:11px; color:var(--text-faint); margin-top:2px;}
  .worth-label{font-size:12px; color:var(--text-dim); margin-top:14px;}
  .worth-value{font-size:38px; font-weight:600; margin-top:2px; letter-spacing:-.01em;}
  .iconbtn{width:38px; height:38px; border-radius:50%; background:var(--surface2); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; color:var(--text-dim);}

  main{padding:16px 16px 24px;}
  .tab{display:none; animation:fade .18s ease;}
  .tab.active{display:block;}
  @keyframes fade{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;}}

  .section-title{font-size:12px; text-transform:uppercase; letter-spacing:.1em; color:var(--text-dim); margin:22px 0 10px; display:flex; justify-content:space-between; align-items:center;}
  .section-title:first-child{margin-top:0;}

  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:10px;}
  .row{display:flex; justify-content:space-between; align-items:center;}
  .row + .row{margin-top:10px; padding-top:10px; border-top:1px solid var(--line);}
  .row .label{color:var(--text-dim); font-size:13.5px;}
  .row .value{font-weight:600; font-variant-numeric:tabular-nums;}
  .pos{color:var(--teal);} .neg{color:var(--red);}

  .kpi-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .kpi{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:14px;}
  .kpi .k-label{font-size:11.5px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.06em;}
  .kpi .k-value{font-size:20px; font-weight:600; margin-top:4px; font-family:'Fraunces',serif;}

  .netgrid{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;}
  .netgrid .row{padding:14px 16px; margin:0; border-radius:0;}
  .netgrid .row + .row{margin-top:0;}
  .netgrid .row.total{background:var(--surface2); border-top:1px solid var(--amber-dim);}
  .netgrid .row.total .value{color:var(--amber); font-size:19px;}

  .seg{display:flex; gap:6px; margin-bottom:14px;}
  .seg-btn{flex:1; background:var(--surface2); border:1px solid var(--line); color:var(--text-dim); font-family:'Inter'; font-weight:600; font-size:12px; padding:9px 6px; border-radius:9px;}
  .seg-btn.active{background:var(--amber); color:#1A1206; border-color:var(--amber);}
  .town-group{margin-bottom:14px;}
  .town-head{display:flex; justify-content:space-between; align-items:center; padding:4px 2px 8px; cursor:pointer;}
  .town-head .t-name{font-weight:600; font-size:13.5px; color:var(--amber); display:flex; align-items:center; gap:6px;}
  .town-head .t-sub{font-size:12px; color:var(--text-dim);}
  .town-head .caret{transition:transform .15s;}
  .town-group.collapsed .caret{transform:rotate(-90deg);}
  .town-group.collapsed .town-body{display:none;}
  .list-item{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:8px;}
  .list-item.dense{padding:11px 14px; display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .list-item.dense .li-name{font-size:13.5px;}
  .list-item.dense .li-sub{font-size:11.5px;}
  .list-item.dense .li-amount{font-size:14px;}
  .li-top{display:flex; justify-content:space-between; gap:10px;}
  .li-name{font-weight:600; font-size:15px;}
  .li-sub{font-size:12.5px; color:var(--text-dim); margin-top:2px;}
  .li-amount{font-weight:600; font-family:'Fraunces',serif; font-size:16px; white-space:nowrap;}
  .li-meta{display:flex; gap:8px; margin-top:8px; flex-wrap:wrap;}
  .chip{font-size:11px; padding:3px 8px; border-radius:20px; background:var(--surface2); color:var(--text-dim); border:1px solid var(--line);}
  .chip-red{background:rgba(226,104,90,.15); color:var(--red); border-color:rgba(226,104,90,.35);}
  .chip-amber{background:rgba(232,163,61,.18); color:var(--amber); border-color:rgba(232,163,61,.4);}
  .li-notes{font-size:12.5px; color:var(--text-faint); margin-top:6px; font-style:italic;}
  .li-actions{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}
  .li-actions button, .li-actions a{flex:1 1 auto; min-width:84px; text-align:center; text-decoration:none; display:inline-flex; align-items:center; justify-content:center;}

  .lock-screen{position:fixed; inset:0; background:var(--bg); z-index:100; display:flex; align-items:center; justify-content:center; padding:24px;}
  .lock-inner{width:100%; max-width:320px; text-align:center;}
  .lock-inner .lock-icon{font-size:38px; margin-bottom:6px;}
  .lock-inner h2{margin:0 0 4px; font-size:20px;}
  .lock-inner p{color:var(--text-dim); font-size:13px; margin:0 0 18px;}
  .lock-inner input{text-align:center; font-size:24px; letter-spacing:8px; padding:14px;}
  .lock-error{color:var(--red); font-size:12.5px; margin-top:10px; min-height:16px;}

  .btn{border:none; border-radius:11px; padding:10px 14px; font-family:'Inter'; font-weight:600; font-size:13.5px; cursor:pointer;}
  .btn-ghost{background:var(--surface2); color:var(--text-dim); border:1px solid var(--line);}
  .btn-danger{background:rgba(226,104,90,.12); color:var(--red); border:1px solid rgba(226,104,90,.3);}
  .btn-primary{background:var(--amber); color:#1A1206;}
  .fab{position:fixed; right:18px; bottom:calc(90px + env(safe-area-inset-bottom)); width:54px; height:54px; border-radius:50%; background:var(--amber); color:#1A1206; font-size:26px; border:none; box-shadow:0 8px 20px rgba(0,0,0,.4); z-index:6;}

  nav.bottom{
    position:fixed; left:0; right:0; bottom:0; z-index:10;
    background:var(--nav-bg); backdrop-filter:blur(10px);
    border-top:1px solid var(--line);
    display:flex; padding:8px 4px calc(8px + env(safe-area-inset-bottom));
  }
  nav.bottom button{
    flex:1; background:none; border:none; color:var(--text-faint);
    display:flex; flex-direction:column; align-items:center; gap:3px;
    font-size:10.5px; font-family:'Inter'; padding:6px 2px;
  }
  nav.bottom button .ic{font-size:19px; line-height:1;}
  nav.bottom button.active{color:var(--amber);}

  .weekcard{margin-bottom:14px;}
  .weekcard .wk-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
  .weekcard .wk-head .wk-title{font-weight:600; font-size:14px;}
  .weekcard .wk-head .wk-total{font-family:'Fraunces',serif; color:var(--amber); font-weight:600;}
  .day-row{display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-top:1px solid var(--line);}
  .day-row:first-of-type{border-top:none;}
  .day-row label{font-size:13px; color:var(--text-dim); width:80px;}
  .day-row input{width:120px; text-align:right;}

  input, select, textarea{
    background:var(--surface2); border:1px solid var(--line); color:var(--text);
    border-radius:9px; padding:9px 10px; font-family:'Inter'; font-size:14px; width:100%;
  }
  input:focus, select:focus, textarea:focus{outline:1px solid var(--amber);}
  .field{margin-bottom:10px;}
  .field label{display:block; font-size:11.5px; color:var(--text-dim); margin-bottom:4px; text-transform:uppercase; letter-spacing:.05em;}
  .field-row{display:flex; gap:8px;}
  .field-row .field{flex:1;}

  .modal-backdrop{position:fixed; inset:0; background:rgba(6,10,8,.6); z-index:20; display:none; align-items:flex-end;}
  .modal-backdrop.open{display:flex;}
  .modal{background:var(--surface); border-top:1px solid var(--line); border-radius:20px 20px 0 0; padding:18px; width:100%; max-height:88vh; overflow-y:auto; animation:up .2s ease;}
  @keyframes up{from{transform:translateY(30px); opacity:0;} to{transform:none; opacity:1;}}
  .modal h3{margin:0 0 14px; font-size:18px;}
  .modal-actions{display:flex; gap:10px; margin-top:16px;}
  .modal-actions button{flex:1; padding:12px;}

  .empty{text-align:center; padding:30px 10px; color:var(--text-faint); font-size:13.5px;}

  .settings-item{padding:14px 0; border-top:1px solid var(--line);}
  .settings-item:first-child{border-top:none;}
  .settings-item p{margin:0 0 10px; font-size:12.5px; color:var(--text-dim); line-height:1.5;}

  .month-table .row .value{font-family:'Fraunces',serif;}
  .toast{position:fixed; top:calc(14px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%); background:var(--amber); color:#1A1206; padding:9px 18px; border-radius:20px; font-size:13px; font-weight:600; z-index:50; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s;}
  .toast.show{opacity:1; transform:translate(-50%,4px);}
</style>
</head>
<body>

<div class="lock-screen" id="lockScreen" style="display:none;">
  <div class="lock-inner">
    <div class="lock-icon">🔒</div>
    <h2>Oil Ledger</h2>
    <p>Enter your PIN to open</p>
    <input id="lockInput" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="8" autocomplete="off" placeholder="••••">
    <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="tryUnlock()">Unlock</button>
    <div class="lock-error" id="lockError"></div>
  </div>
</div>

<header class="top">
  <div class="brand">
    <div>
      <div class="brand-name">🛢️ Oil Ledger</div>
      <div class="brand-sub" id="dateStamp">—</div>
    </div>
    <button class="iconbtn" onclick="openSettings()">⚙︎</button>
  </div>
  <div class="worth-label">Total business net worth</div>
  <div class="worth-value" id="netWorthTop">GHS 0</div>
</header>

<main>
  <!-- DASHBOARD -->
  <section class="tab active" id="tab-dashboard">
    <div class="section-title">Net worth components</div>
    <div class="netgrid" id="netGrid"></div>

    <div class="section-title">This month at a glance</div>
    <div class="kpi-grid" id="kpiGrid"></div>

    <div class="section-title">Weekly snapshot</div>
    <div class="card" id="weekSnap"></div>

    <div class="section-title">Weekly revenue trend</div>
    <div class="card" id="weekChart"></div>
  </section>

  <!-- DAILY SALES -->
  <section class="tab" id="tab-sales">
    <div class="section-title">
      <span>Daily cash collected</span>
      <span id="salesGrand" style="color:var(--amber); font-weight:600;"></span>
    </div>
    <div id="salesWeeks"></div>
  </section>

  <!-- DEBTORS -->
  <section class="tab" id="tab-debtors">
    <div class="section-title">
      <span>Customers who owe you</span>
      <span id="debtorsTotal" style="color:var(--amber); font-weight:600;"></span>
    </div>
    <div class="field" style="margin-bottom:10px;">
      <input id="debtorSearch" placeholder="Search name or town…" oninput="debtorsView.search=this.value; renderDebtors();">
    </div>
    <button class="btn btn-ghost" style="width:100%; margin-bottom:12px;" onclick="shareDebtSummary()">📤 Share debt summary</button>
    <div class="seg" id="debtorControls">
      <button class="seg-btn active" data-group="town" onclick="setDebtorGroup('town')">By town</button>
      <button class="seg-btn" data-group="flat" onclick="setDebtorGroup('flat')">Flat list</button>
      <button class="seg-btn" id="debtorDenseBtn" onclick="toggleDebtorDense()">Compact</button>
    </div>
    <div id="debtorsList"></div>
  </section>

  <!-- EXPENSES -->
  <section class="tab" id="tab-expenses">
    <div class="section-title">
      <span>Operating expenses</span>
      <span id="expensesTotal" style="color:var(--amber); font-weight:600;"></span>
    </div>
    <div class="field" style="margin-bottom:10px;">
      <input id="expenseSearch" placeholder="Search category or description…" oninput="expensesView.search=this.value; renderExpenses();">
    </div>
    <div class="seg" id="expenseControls">
      <button class="seg-btn active" data-sort="date" onclick="setExpenseSort('date')">Newest first</button>
      <button class="seg-btn" data-sort="amount" onclick="setExpenseSort('amount')">Highest first</button>
    </div>
    <div id="expensesList"></div>
  </section>

  <!-- STOCK -->
  <section class="tab" id="tab-stock">
    <div class="section-title">
      <span>Goods at home (batches)</span>
      <span id="stockTotal" style="color:var(--amber); font-weight:600;"></span>
    </div>
    <div class="field" style="margin-bottom:10px;">
      <input id="stockSearch" placeholder="Search batch description…" oninput="stockView.search=this.value; renderStock();">
    </div>
    <div class="seg" id="stockControls">
      <button class="seg-btn active" data-sort="date" onclick="setStockSort('date')">Newest first</button>
      <button class="seg-btn" data-sort="value" onclick="setStockSort('value')">Highest value</button>
    </div>
    <div id="stockList"></div>
  </section>

  <!-- MONTHLY -->
  <section class="tab" id="tab-monthly">
    <div class="section-title">Monthly performance — 2026</div>
    <div class="card" id="monthChart" style="margin-bottom:14px;"></div>
    <div class="card month-table" id="monthlyList"></div>
  </section>
</main>

<button class="fab" id="fab" onclick="handleFab()">＋</button>

<nav class="bottom" id="bottomNav">
  <button data-tab="dashboard" class="active"><span class="ic">🏠</span>Home</button>
  <button data-tab="sales"><span class="ic">📅</span>Sales</button>
  <button data-tab="debtors"><span class="ic">📋</span>Debtors</button>
  <button data-tab="expenses"><span class="ic">💸</span>Expenses</button>
  <button data-tab="stock"><span class="ic">📦</span>Stock</button>
  <button data-tab="monthly"><span class="ic">📊</span>Monthly</button>
</nav>

<div class="modal-backdrop" id="modalBackdrop"><div class="modal" id="modalBody"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ---------- Seed data ----------
   This is the PUBLIC version of Oil Ledger — it starts empty on purpose.
   No real customer names, phone numbers, or business figures are stored
   in this file, since anyone can view a public site's source code.
   Restore your real data after opening this via Settings → Restore backup,
   using the backup file you downloaded from your private local copy. */
function seedData(){
  return {
    nextId: 1000,
    dailySales: {
      1:{Monday:0,Tuesday:0,Wednesday:0,Thursday:0,Friday:0,Saturday:0,Sunday:0},
      2:{Monday:0,Tuesday:0,Wednesday:0,Thursday:0,Friday:0,Saturday:0,Sunday:0},
      3:{Monday:0,Tuesday:0,Wednesday:0,Thursday:0,Friday:0,Saturday:0,Sunday:0},
      4:{Monday:0,Tuesday:0,Wednesday:0,Thursday:0,Friday:0,Saturday:0,Sunday:0}
    },
    customers: [],
    expenses: [],
    batches: [],
    monthly: [
      {month:"January",year:2026,revenue:null,expenses:null},
      {month:"February",year:2026,revenue:null,expenses:null},
      {month:"March",year:2026,revenue:null,expenses:null},
      {month:"April",year:2026,revenue:null,expenses:null},
      {month:"May",year:2026,revenue:null,expenses:null},
      {month:"June",year:2026,revenue:null,expenses:null},
      {month:"July",year:2026,revenue:null,expenses:null},
      {month:"August",year:2026,revenue:null,expenses:null},
      {month:"September",year:2026,revenue:null,expenses:null},
      {month:"October",year:2026,revenue:null,expenses:null},
      {month:"November",year:2026,revenue:null,expenses:null},
      {month:"December",year:2026,revenue:null,expenses:null}
    ]
  };
}

/* ---------- State + persistence ----------
   Data is saved to this browser's local storage automatically, so it stays
   on this phone between visits. Use Settings → Backup to export a copy. */
const STORE_KEY = "oilLedgerData_v1";
let state;
try{
  const saved = localStorage.getItem(STORE_KEY);
  state = saved ? JSON.parse(saved) : seedData();
}catch(e){ state = seedData(); }

function persist(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){}
}
function uid(){ return state.nextId++; }

/* ---------- Helpers ---------- */
const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
function money(n){
  n = Number(n)||0;
  return "GHS " + n.toLocaleString("en-US",{maximumFractionDigits:0});
}
function num(v){ const n = parseFloat(v); return isNaN(n) ? 0 : n; }
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t = setTimeout(()=>t.classList.remove('show'), 1600);
}

/* ---------- Computed totals ---------- */
function weekTotal(w){ return DAYS.reduce((s,d)=> s + num(state.dailySales[w][d]), 0); }
function totalCash(){ return [1,2,3,4].reduce((s,w)=> s + weekTotal(w), 0); }
function customerOwed(c){ return num(c.bottles) * num(c.price); }
function totalDebt(){ return state.customers.reduce((s,c)=> s + customerOwed(c), 0); }
function totalExpenses(){ return state.expenses.reduce((s,e)=> s + num(e.amount), 0); }
function batchRemaining(b){ return (num(b.produced) - num(b.sold)) * num(b.retailPrice); }
function batchProfit(b){ return num(b.produced) * num(b.retailPrice) - num(b.bulkCost); }
function batchPerBottle(b){ return num(b.produced) ? batchProfit(b) / num(b.produced) : 0; }
function totalStock(){ return state.batches.reduce((s,b)=> s + batchRemaining(b), 0); }
function netWorth(){ return totalCash() + totalDebt() + totalStock() - totalExpenses(); }
function expensesForWeek(w){ return state.expenses.filter(e=>e.weekRef===("Week "+w)).reduce((s,e)=>s+num(e.amount),0); }

/* ---------- Date aging / stock warnings ---------- */
function parseFlexibleDate(s){
  if(!s) return null;
  s = String(s).trim();
  if(!s) return null;
  let m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return new Date(+m[1], +m[2]-1, +m[3]);
  const cleaned = s.replace(/(\d+)(st|nd|rd|th)/i, '$1');
  const d = new Date(cleaned);
  return isNaN(d.getTime()) ? null : d;
}
function daysAgo(dateStr){
  const d = parseFlexibleDate(dateStr);
  if(!d) return null;
  return Math.floor((Date.now() - d.getTime()) / 86400000);
}
function agingChip(c){
  const days = daysAgo(c.date);
  if(days==null || days<0) return '';
  if(days>=30) return `<span class="chip chip-red">${days}d overdue</span>`;
  if(days>=14) return `<span class="chip chip-amber">${days}d ago</span>`;
  return '';
}
function lowStockChip(b){
  const rem = num(b.produced) - num(b.sold);
  if(rem<=0) return `<span class="chip chip-red">Sold out</span>`;
  if(rem<=3) return `<span class="chip chip-amber">Low stock</span>`;
  return '';
}

/* ---------- Tiny inline SVG bar chart (no external library, works offline) ---------- */
function svgBarChart(values, labels){
  const w=320, h=120, pad=22;
  const max = Math.max(1, ...values.map(v=>Math.abs(v)));
  const gap = (w-pad*2)/values.length;
  const barW = gap*0.55;
  const zero = h-pad;
  const bars = values.map((v,i)=>{
    const barH = Math.max(2, Math.abs(v)/max*(zero-pad));
    const x = pad + i*gap + (gap-barW)/2;
    const y = v>=0 ? zero-barH : zero;
    const color = v>=0 ? 'var(--teal)' : 'var(--red)';
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${barH.toFixed(1)}" rx="3" style="fill:${color}"></rect>
      <text x="${(x+barW/2).toFixed(1)}" y="${h-6}" font-size="9" style="fill:var(--text-faint)" text-anchor="middle">${esc(labels[i])}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%; height:auto; display:block;">
    <line x1="${pad}" y1="${zero}" x2="${w-pad}" y2="${zero}" style="stroke:var(--line)"></line>
    ${bars}
  </svg>`;
}

function renderDebtors(){

  const filtered = state.customers.filter(c =>
    !q || (c.name||'').toLowerCase().includes(q) || (c.location||'').toLowerCase().includes(q)
  );
  if(!filtered.length){ el.innerHTML = `<div class="empty">No debtors match "${esc(debtorsView.search)}".</div>`; return; }

  if(debtorsView.group === 'flat'){
    const sorted = filtered.slice().sort((a,b)=> customerOwed(b)-customerOwed(a));
    el.innerHTML = sorted.map(debtorCardHtml).join('');
    return;
  }

  // group by town
  const groups = {};
  filtered.forEach(c=>{
    const key = c.location && c.location.trim() ? c.location.trim() : 'No town listed';
    (groups[key] = groups[key] || []).push(c);
  });
  const townNames = Object.keys(groups).sort((a,b)=> a.localeCompare(b));
  el.innerHTML = townNames.map(town=>{
    const list = groups[town];
    const subtotal = list.reduce((s,c)=> s + customerOwed(c), 0);

function checkDuplicateName(excludeId){
  const val = document.getElementById('f_name').value.trim().toLowerCase();
  const warnEl = document.getElementById('nameWarning');
  if(!val){ warnEl.textContent=''; return; }
  const exact = state.customers.find(c => c.id!==excludeId && (c.name||'').trim().toLowerCase()===val);
  if(exact){ warnEl.textContent = `⚠️ "${exact.name}" already exists${exact.location?' in '+exact.location:''} — check you're not double-logging.`; return; }
  const partial = val.length>=4 && state.customers.find(c => c.id!==excludeId && (c.name||'').trim().toLowerCase().includes(val));
  warnEl.textContent = partial ? `⚠️ Similar name exists: "${partial.name}"${partial.location?' in '+partial.location:''}.` : '';
}

function phoneDigits(s){ return (s||'').replace(/\D/g,''); }
function waLink(contact,name,amount){
  let d = phoneDigits(contact);
  if(d.startsWith('0')) d = '233'+d.slice(1);
  else if(!d.startsWith('233')) d = '233'+d;
  const msg = encodeURIComponent(`Hi ${name}, this is a reminder that you owe ${money(amount)} for oil. Please let me know when you can settle it. Thank you.`);
  return `https://wa.me/${d}?text=${msg}`;
}

function buildDebtSummaryText(){
  const q = debtorsView.search.trim().toLowerCase();
  const filtered = state.customers.filter(c => customerOwed(c)>0 && (!q || (c.name||'').toLowerCase().includes(q) || (c.location||'').toLowerCase().includes(q)));
  if(!filtered.length) return 'No outstanding debts.';
  const groups = {};
  filtered.forEach(c=>{ const k = c.location && c.location.trim() ? c.location.trim() : 'No town listed'; (groups[k]=groups[k]||[]).push(c); });
  const lines = ['Outstanding debts — Oil Ledger', ''];
  Object.keys(groups).sort((a,b)=>a.localeCompare(b)).forEach(town=>{
    lines.push(town + ':');
    groups[town].forEach(c=> lines.push(`  ${c.name} — ${num(c.bottles)} bottles — ${money(customerOwed(c))}`));
    lines.push('');
  });
  lines.push(`Total owed: ${money(totalDebt())}`);
  return lines.join('\n');
}
function shareDebtSummary(){
  const text = buildDebtSummaryText();
  if(navigator.share){
    navigator.share({title:'Outstanding debts', text}).catch(()=>{});
  }else if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>toast('Copied — paste into WhatsApp')).catch(()=>fallbackCopy(text));
  }else{
    fallbackCopy(text);
  }
}
function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); toast('Copied — paste into WhatsApp'); }
  catch(e){ toast('Could not copy — long-press to copy manually'); }
  ta.remove();
}

    id: document.getElementById('f_id').value.trim() || ('B'+(state.batches.length+1)),
    date: document.getElementById('f_date').value.trim(),
    description: document.getElementById('f_description').value.trim(),
    bulkCost: num(document.getElementById('f_bulkcost').value),
    retailPrice: num(document.getElementById('f_retail').value),
    produced: num(document.getElementById('f_produced').value),
    sold: num(document.getElementById('f_sold').value)
  };
  if(id){ Object.assign(state.batches.find(x=>x.id===id), data); }
  else{ state.batches.unshift(data); }
  closeModal(); renderAll(); toast('Saved');
}

function editMonth(i){
  const m = state.monthly[i];
  openModal(`
    <h3>${m.month} ${m.year}</h3>
    <div class="field-row">
      <div class="field"><label>Revenue (GHS)</label><input id="f_rev" type="number" inputmode="decimal" value="${m.revenue==null?'':m.revenue}"></div>
      <div class="field"><label>Expenses (GHS)</label><input id="f_exp" type="number" inputmode="decimal" value="${m.expenses==null?'':m.expenses}"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveMonth(${i})">Save</button>
    </div>
  `);
}
function saveMonth(i){
  const rev = document.getElementById('f_rev').value;
  const exp = document.getElementById('f_exp').value;
  state.monthly[i].revenue = rev===''? null : num(rev);
  state.monthly[i].expenses = exp===''? null : num(exp);
  closeModal(); renderAll(); toast('Saved');
}

function removeItem(list,id){
  openModal(`
    <h3>Delete this entry?</h3>
    <p style="color:var(--text-dim); font-size:13.5px;">This can't be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmRemove('${list}','${id}')">Delete</button>
    </div>
  `);
}
function confirmRemove(list,id){
  state[list] = state[list].filter(x=> String(x.id) !== String(id));
  closeModal(); renderAll(); toast('Deleted');
}

/* ---------- Settings / backup ---------- */
function openSettings(){
  const isLight = document.documentElement.getAttribute('data-theme')==='light';
  const hasPin = !!localStorage.getItem(PIN_KEY);
  openModal(`
    <h3>Settings & backup</h3>
    <div class="settings-item">
      <p>Your data saves automatically to this phone's browser. Add this page to your Home Screen (browser menu → "Add to Home screen") so it opens like an app, full screen, without typing the address again. It works fully offline once added.</p>
    </div>
    <div class="settings-item">
      <p>${isLight?'Light mode is on — easier to read outdoors in bright sun.':'Dark mode is on. Switch to light for better readability outdoors.'}</p>
      <button class="btn btn-ghost" style="width:100%;" onclick="toggleTheme()">Switch to ${isLight?'dark':'light'} mode</button>
    </div>
    <div class="settings-item">
      <p>${hasPin?'A PIN currently locks this app when it opens.':'Add a PIN so the app locks when it opens. This is a basic screen lock, not encryption — it just stops casual snooping, not a determined attacker with access to the phone.'}</p>
      <button class="btn btn-ghost" style="width:100%;" onclick="openPinSettings()">${hasPin?'Change or remove PIN':'Set a PIN'}</button>
    </div>
    <div class="settings-item">
      <p>Download a backup copy of your data as a file, in case you switch phones or clear browser data.</p>
      <button class="btn btn-primary" style="width:100%;" onclick="exportData()">Download backup</button>
    </div>
    <div class="settings-item">
      <p>Restore from a previously downloaded backup file. This replaces everything currently in the app.</p>
      <input type="file" id="importFile" accept="application/json" style="margin-bottom:10px;">
      <button class="btn btn-ghost" style="width:100%;" onclick="importData()">Restore backup</button>
    </div>
    <div class="settings-item">
      <p style="color:var(--red);">Erase all data on this phone and start over from a blank ledger.</p>
      <button class="btn btn-danger" style="width:100%;" onclick="wipeData()">Erase everything</button>
    </div>
    <div class="modal-actions"><button class="btn btn-ghost" style="width:100%;" onclick="closeModal()">Close</button></div>
  `);
}
function exportData(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'oil-ledger-backup-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('Backup downloaded');
}
function importData(){
  const inp = document.getElementById('importFile');
  if(!inp.files.length){ toast('Choose a backup file first'); return; }
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!data.customers || !data.dailySales) throw new Error('bad file');
      state = data;
      closeModal(); renderAll(); toast('Backup restored');
    }catch(e){ toast('Could not read that file'); }
  };
  reader.readAsText(inp.files[0]);
}
function wipeData(){
  openModal(`
    <h3>Erase everything?</h3>
    <p style="color:var(--text-dim); font-size:13.5px;">All customers, expenses, batches and sales on this phone will be permanently deleted. Consider downloading a backup first.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="state=seedData(); closeModal(); renderAll(); toast('Reset to original data');">Erase</button>
    </div>
  `);
}

/* ---------- Theme ---------- */
function toggleTheme(){
  const next = document.documentElement.getAttribute('data-theme')==='light' ? 'dark' : 'light';
  setTheme(next);
  openSettings();
}
function setTheme(t){
  if(t==='light') document.documentElement.setAttribute('data-theme','light');
  else document.documentElement.removeAttribute('data-theme');
  try{ localStorage.setItem('oilLedgerTheme', t); }catch(e){}
  const m = document.querySelector('meta[name="theme-color"]');
  if(m) m.setAttribute('content', t==='light' ? '#F7F3EA' : '#101B17');
}

/* ---------- PIN lock ----------
   Basic screen lock only — the PIN is stored on this device's browser
   storage, not encrypted. It stops casual snooping, not a determined attacker. */
const PIN_KEY = 'oilLedgerPin';
function checkLock(){
  const pin = localStorage.getItem(PIN_KEY);
  if(pin) document.getElementById('lockScreen').style.display = 'flex';
}
function tryUnlock(){
  const entered = document.getElementById('lockInput').value;
  const pin = localStorage.getItem(PIN_KEY);
  if(entered && entered === pin){
    document.getElementById('lockScreen').style.display = 'none';
  }else{
    document.getElementById('lockError').textContent = 'Wrong PIN — try again';
    document.getElementById('lockInput').value = '';
  }
}
document.getElementById('lockInput').addEventListener('keydown', e=>{ if(e.key==='Enter') tryUnlock(); });

function openPinSettings(){
  const has = !!localStorage.getItem(PIN_KEY);
  openModal(`
    <h3>${has?'Change or remove PIN':'Set a PIN'}</h3>
    <p style="color:var(--text-dim); font-size:12.5px; margin-bottom:10px;">A simple screen lock for this device — not real encryption, just a barrier against casual snooping.</p>
    <div class="field"><label>New PIN (4+ digits)</label><input id="f_pin" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="8"></div>
    <div class="modal-actions">
      ${has?'<button class="btn btn-danger" onclick="removePin()">Remove PIN</button>':''}
      <button class="btn btn-primary" onclick="savePin()">Save</button>
    </div>
  `);
}
function savePin(){
  const v = document.getElementById('f_pin').value.trim();
  if(v.length<4){ toast('PIN needs at least 4 digits'); return; }
  localStorage.setItem(PIN_KEY, v);
  closeModal(); toast('PIN set');
}
function removePin(){
  localStorage.removeItem(PIN_KEY);
  closeModal(); toast('PIN removed');
}

/* ---------- Init ---------- */
renderAll();
checkLock();
</script>
</body>
</html>
